<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="webTitle">Dashboard - pengajuan jackpot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* RESET & SKALA KECIL */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-size: 0.95rem;
    }

    /* Kecilin font dasar */

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d0d0d;
      color: #ffffff;
      padding: 15px;
      /* Kurangi padding luar */
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.3s;
    }

    /* CONTAINER DIBUAT LEBIH RAMPING */
    .header-text {
      width: 100%;
      max-width: 400px;
      font-size: 0.8rem;
      margin-bottom: 10px;
      color: #888;
    }

    .search-container {
      width: 100%;
      max-width: 400px;
      position: relative;
      margin-bottom: 15px;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      /* Lebih tipis */
      background: #151515;
      border: 1px solid #222;
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
    }

    .title-section {
      width: 100%;
      max-width: 400px;
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* TABEL DIBUAT LEBIH PADAT */
    .table-container {
      width: 100%;
      max-width: 400px;
      background: #151515;
      border-radius: 12px;
      border: 1px solid #222;
      height: 320px;
      /* Sedikit lebih pendek biar kelihatan semua */
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #222;
      color: #555;
      font-size: 0.65rem;
      position: sticky;
      top: 0;
      background: #151515;
    }

    td {
      padding: 8px 10px;
      /* Padding lebih sempit */
      font-size: 0.68rem;
      /* Font data lebih kecil */
      color: #888;
      border-bottom: 1px dotted #222;
    }

    /* WARNA TEMA */
    .pejuang-theme .search-box {
      border-color: #2ecc71;
    }
    .lion-theme .search-box {
      border-color: #f1c40f;
    }
    .pejuang-theme .status-done {
      color: #2ecc71;
      font-weight: 600;
    }
    .lion-theme .status-done {
      color: #f1c40f;
      font-weight: 600;
    }
    .status-pending {
      color: #f1c40f;
      font-weight: 600;
    }

    /* MODAL DIBUAT LEBIH KECIL */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modal-card {
      background: #111;
      width: 80%;
      max-width: 300px;
      padding: 25px 15px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid #333;
    }
    .check-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 15px;
      font-size: 30px;
      color: white;
    }

    .pejuang-theme .check-circle {
      background: #2ecc71;
    }
    .lion-theme .check-circle {
      background: #f1c40f;
    }

    .btn-ya {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      cursor: pointer;
    }
    .pejuang-theme .btn-ya {
      background: #2ecc71;
    }
    .lion-theme .btn-ya {
      background: #f1c40f;
    }

    /* NAVIGASI BAWAH LEBIH TIPIS */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 450px;
      background: #0a0a0a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #222;
    }
    .nav-item {
      text-align: center;
      color: #444;
      font-size: 0.65rem;
      cursor: pointer;
    }
    .pejuang-theme .nav-item.active {
      color: #2ecc71;
    }
    .lion-theme .nav-item.active {
      color: #f1c40f;
    }
    .nav-icon {
      display: block;
      font-size: 1rem;
      margin-bottom: 3px;
    }
  </style>
</head>
<body class="pejuang-theme">

  <p class="header-text" id="brandDesc">
    Cari nomor terpilih 
  </p>

  <div class="search-container">
    <input type="text" id="waInput" class="search-box" placeholder="Masukkan nomor DB...">
    <span style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #444; cursor: pointer;" onclick="openModal()">🔍</span>
  </div>

  <p class="title-section" id="tableTitle">
    Catatan pengajuan jackpot
  </p>

  <div class="table-container">
    <table>
      <thead id="tableHead">
        <tr><th>Tanggal</th><th>Nomor WA</th><th>Uid</th><th>No.Deposit</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal-card">
      <div class="check-circle">
        ✓
      </div>
      <h3 style="font-size: 1rem; margin-bottom: 5px;">Berhasil</h3>
      <p style="color: #666; font-size: 0.75rem; margin-bottom: 20px;">
        Pengajuan jackpot telah berhasil 
      </p>
      <button class="btn-ya" onclick="prosesData()">Ya</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" id="navData" onclick="showHistoryData()">
      <span class="nav-icon">🕒</span> Data
    </div>
    <div class="nav-item active" id="navPengajuan" onclick="showPengajuan()">
      <span class="nav-icon">📝</span> Pengajuan
    </div>
    <div class="nav-item" onclick="alert('Menu Telepon')">
      <span class="nav-icon">📞</span> Telepon
    </div>
    <div class="nav-item" onclick="switchAccount()">
      <span class="nav-icon">👤</span> Akun
    </div>
  </div>

  <script>
    let currentBrand = "PEJUANG";
    const waInput = document.getElementById('waInput');
    const tableBody = document.getElementById('tableBody');
    const tableHead = document.getElementById('tableHead');
    const tableTitle = document.getElementById('tableTitle');
    const brandDesc = document.getElementById('brandDesc');
    const webTitle = document.getElementById('webTitle');

    function switchAccount() {
      let targetBrand = (currentBrand === "PEJUANG") ? "jackpot": "jackpot";
      if (confirm(`Pindah ke ${targetBrand}?`)) {
        currentBrand = (currentBrand === "PEJUANG") ? "LION": "PEJUANG";
        document.body.className = currentBrand.toLowerCase() + "-theme";
        webTitle.innerText = "Dashboard - " + currentBrand;
        showPengajuan();
      }
    }

    function openModal() {
      if (waInput.value.trim() === "") return;
      document.getElementById('overlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('overlay').style.display = 'none';
    }

    function showHistoryData() {
      document.getElementById('navData').classList.add('active');
      document.getElementById('navPengajuan').classList.remove('active');
      tableTitle.innerText = `WD ${currentBrand} HARI INI`;
      tableHead.innerHTML = "<tr><th>Provider</th><th>Nama</th><th>WA</th><th>Status</th></tr>";

      const historyData = [{
        provider: "PG SOFT",
        nama: "DEWIPutri",
        wa: "+6283856129174",
        status: "DONE"
      },
    {
      provider: "PRAGMATIC",
          nama: "Febiyanto",
          wa: "+6282287986919",
          status: "DONE"
    },
        {
          provider: "PRAGMATIC",
          nama: "alfikri",
          wa: "+6282287986919",
          status: "DONE"
        }];

      tableBody.innerHTML = "";
      historyData.forEach(item => {
        const statusClass = item.status === "DONE" ? "status-done": "status-pending";
        tableBody.innerHTML += `<tr><td>${item.provider}</td><td>${item.nama}</td><td>${item.wa}</td><td><span class="${statusClass}">${item.status}</span></td></tr>`;
      });
    }

    function showPengajuan() {
      document.getElementById('navData').classList.remove('active');
      document.getElementById('navPengajuan').classList.add('active');
      tableTitle.innerText = `Pengajuan Jackpot ${currentBrand}`;
      brandDesc.innerText = `Cari nomor WA (${currentBrand} CASINO)`;
      tableHead.innerHTML = "<tr><th>Tgl</th><th>Nomor WA</th><th>Uid</th><th>Depo</th></tr>";
      tableBody.innerHTML = "";
    }

    function prosesData() {
      const now = new Date().toLocaleDateString('id-ID');
      if (document.getElementById('navData').classList.contains('active')) {
        const prov = prompt("Provider?") || "PG SOFT";
        const nama = prompt("Nama?") || "User";
        tableBody.insertAdjacentHTML('beforeend', `<tr><td>${prov}</td><td>${nama}</td><td>${waInput.value}</td><td><span class="status-pending">PROSES</span></td></tr>`);
      } else {
        tableBody.insertAdjacentHTML('afterbegin', `<tr><td>${now}</td><td>${waInput.value}</td><td>${Math.floor(100000+Math.random()*900000)}</td><td>DEP-${Math.floor(1000+Math.random()*9000)}</td></tr>`);
      }
      closeModal();
      waInput.value = "";
    }

    waInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") openModal();
    });
  </script>
</body>
</html>
