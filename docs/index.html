<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAGA HOKI - PASTICUAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS TETAP SAMA SEPERTI SEBELUMNYA (DIPERSINGKAT UNTUK EFEKTIVITAS) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; padding-bottom: 70px; }
        
        header { background-color: #000; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-icon { color: #fff; font-size: 1.2rem; cursor: pointer; }

        .btn { flex: 1; padding: 15px; text-align: center; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn-login { background-color: #b71c1c; color: #fff; }
        .btn-register { background-color: #ef6c00; color: #fff; }
        
        .reg-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 5px; color: #fff; margin-top: 5px; outline: none; }
        
        /* MODAL & LOBBY */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #fff; width: 85%; max-width: 320px; border-radius: 15px; padding: 30px 20px; text-align: center; color: #333; }
        
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .game-card { background: #111; border-radius: 10px; border: 1px solid #222; text-align: center; cursor: pointer; }
        .game-card img { width: 100%; height: 90px; object-fit: cover; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 3px solid #b71c1c; z-index: 101; }
        .nav-link { text-align: center; color: #888; font-size: 0.7rem; cursor: pointer; }
        .nav-link span { display: block; font-size: 1.3rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span class="header-icon" onclick="alert('Menu Samping Segera Hadir!')">☰</span>
            <div style="color: #ef5350; font-weight: bold; font-size: 1.2rem;">🐉 PASTI CUAN</div>
        </div>
        <span class="header-icon" onclick="showProfile()">👤</span>
    </header>

    <div id="loginPage" style="padding: 20px;">
        <h2 style="color: #c1a35f; text-align: center; margin-bottom: 20px;">LOGIN MEMBER</h2>
        <label>Username</label>
        <input type="text" id="loginUser" class="reg-input" placeholder="Masukkan Username">
        <label style="display: block; margin-top: 15px;">Password</label>
        <input type="password" id="loginPass" class="reg-input" placeholder="Masukkan Password">
        
        <button onclick="prosesLogin()" style="width: 100%; padding: 15px; background: #b71c1c; border: none; color: white; font-weight: bold; margin-top: 25px; border-radius: 5px;">LOGIN SEKARANG</button>
        <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: #888;">Belum punya akun? <span style="color: #ef6c00; cursor: pointer;" onclick="navTo('register')">Daftar Di Sini</span></p>
    </div>

    <div id="registerPage" style="display: none; padding: 20px;">
        <h2 style="color: #c1a35f; text-align: center; margin-bottom: 20px;">DAFTAR AKUN BARU</h2>
        <input type="text" id="regUser" class="reg-input" placeholder="Username Baru">
        <input type="password" class="reg-input" placeholder="Password" style="margin-top: 10px;">
        <input type="number" class="reg-input" placeholder="Nomor WhatsApp" style="margin-top: 10px;">
        
        <button onclick="prosesDaftar()" style="width: 100%; padding: 15px; background: #ef6c00; border: none; color: white; font-weight: bold; margin-top: 25px; border-radius: 5px;">SUBMIT PENDAFTARAN</button>
        <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: #888;" onclick="navTo('login')">Sudah ada akun? Login</p>
    </div>

    <div id="lobbyPage" style="display: none;">
        <div style="background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #c1a35f;">
            <p style="color: #c1a35f; font-size: 0.8rem;">Selamat Datang, <b id="userNameLobby"></b></p>
            <h2 id="jackpotText">IDR 389,406,783.00</h2>
        </div>
        
        <div class="game-grid">
            <div class="game-card" onclick="playGame('Olympus')"><img src="https://i.ibb.co/L6S9xWj/olympus.jpg"><p>OLYMPUS</p></div>
            <div class="game-card" onclick="playGame('Starlight')"><img src="https://i.ibb.co/mS0GfXm/starlight.jpg"><p>STARLIGHT</p></div>
            <div class="game-card" onclick="playGame('Mahjong')"><img src="https://i.postimg.cc/mD8zYpL6/mahjong-ways.jpg"><p>MAHJONG</p></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link" onclick="navTo('login')"><span>🏠</span>HOME</div>
        <div class="nav-link" onclick="alert('Hubungi CS di WA: 08xxxxx')"><span>🎧</span>LIVECHAT</div>
        <div class="nav-link" onclick="showProfile()"><span>👤</span>AKUN</div>
    </div>

    <div id="successModal" class="modal-overlay">
        <div class="modal-box">
            <div style="font-size: 3rem; color: #a5dc86;">✓</div>
            <h2>Berhasil!</h2>
            <p>Akun anda sudah aktif. Silahkan login untuk mulai bermain.</p>
            <button onclick="closeModal()" style="width: 100%; padding: 10px; background: #7b68ee; color: white; border: none; margin-top: 15px;">OK</button>
        </div>
    </div>

    <script>
        // Navigasi antar halaman
        function navTo(page) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('registerPage').style.display = 'none';
            document.getElementById('lobbyPage').style.display = 'none';
            
            if(page === 'login') document.getElementById('loginPage').style.display = 'block';
            if(page === 'register') document.getElementById('registerPage').style.display = 'block';
        }

        function prosesDaftar() {
            const user = document.getElementById('regUser').value;
            if(!user) return alert("Isi username!");
            document.getElementById('successModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            navTo('login');
        }

        function prosesLogin() {
            const user = document.getElementById('loginUser').value;
            if(user === "") return alert("Masukkan username!");
            
            // Simulasi Login Sukses
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('lobbyPage').style.display = 'block';
            document.getElementById('userNameLobby').innerText = user;
            startJackpot();
        }

        function showProfile() {
            const currentDisplay = document.getElementById('lobbyPage').style.display;
            if(currentDisplay === 'block') {
                alert("Menu Akun: Saldo Anda IDR 0. Silahkan Deposit!");
            } else {
                alert("Silahkan Login Terlebih Dahulu!");
                navTo('login');
            }
        }

        function playGame(name) {
            alert("Membuka Game: " + name + "... (Koneksi ke Server)");
        }

        function startJackpot() {
            let num = 389406783;
            setInterval(() => {
                num += Math.floor(Math.random() * 500);
                document.getElementById("jackpotText").innerText = "IDR " + num.toLocaleString() + ".00";
            }, 200);
        }
    </script>
</body>
</html>
