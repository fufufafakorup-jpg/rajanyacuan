<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="webTitle">Dashboard - RAJANYACUAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* RESET & SKALA KECIL */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-size: 0.95rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d0d0d;
      color: #ffffff;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.3s;
    }

    .header-text {
      width: 100%;
      max-width: 400px;
      font-size: 0.8rem;
      margin-bottom: 10px;
      color: #888;
    }

    .search-container {
      width: 100%;
      max-width: 400px;
      position: relative;
      margin-bottom: 15px;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      background: #151515;
      border: 1px solid #f1c40f; /* Warna Gold Cuan */
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
    }

    .title-section {
      width: 100%;
      max-width: 400px;
      font-size: 0.7rem;
      color: #f1c40f;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .table-container {
      width: 100%;
      max-width: 400px;
      background: #151515;
      border-radius: 12px;
      border: 1px solid #222;
      height: 320px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #222;
      color: #555;
      font-size: 0.65rem;
      position: sticky;
      top: 0;
      background: #151515;
    }

    td {
      padding: 8px 10px;
      font-size: 0.68rem;
      color: #ccc;
      border-bottom: 1px dotted #222;
    }

    .status-done {
      color: #f1c40f;
      font-weight: 600;
    }
    .status-pending {
      color: #e67e22;
      font-weight: 600;
    }

    /* MODAL */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .modal-card {
      background: #111;
      width: 80%;
      max-width: 300px;
      padding: 25px 15px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid #f1c40f;
    }
    .check-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 15px;
      font-size: 30px;
      color: #000;
      background: #f1c40f;
    }

    .btn-ya {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      background: #f1c40f;
      cursor: pointer;
    }

    /* NAVIGASI BAWAH */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 450px;
      background: #0a0a0a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #222;
    }
    .nav-item {
      text-align: center;
      color: #444;
      font-size: 0.65rem;
      cursor: pointer;
    }
    .nav-item.active {
      color: #f1c40f;
    }
    .nav-icon {
      display: block;
      font-size: 1rem;
      margin-bottom: 3px;
    }
  </style>
</head>
<body>

  <p class="header-text" id="brandDesc">
    Cari nomor WA (RAJANYACUAN)
  </p>

  <div class="search-container">
    <input type="text" id="waInput" class="search-box" placeholder="Masukkan nomor DB...">
    <span style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #f1c40f; cursor: pointer;" onclick="openModal()">🔍</span>
  </div>

  <p class="title-section" id="tableTitle">
    Catatan pengajuan jackpot
  </p>

  <div class="table-container">
    <table>
      <thead id="tableHead">
        <tr><th>Tanggal</th><th>Nomor WA</th><th>Uid</th><th>No.Deposit</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal-card">
      <div class="check-circle">✓</div>
      <h3 style="font-size: 1rem; margin-bottom: 5px; color: #f1c40f;">CUAN BERHASIL</h3>
      <p style="color: #888; font-size: 0.75rem; margin-bottom: 20px;">
        Pengajuan Rajanyacuan telah diproses
      </p>
      <button class="btn-ya" onclick="prosesData()">OKE GAS</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" id="navData" onclick="showHistoryData()">
      <span class="nav-icon">🕒</span> Data
    </div>
    <div class="nav-item active" id="navPengajuan" onclick="showPengajuan()">
      <span class="nav-icon">📝</span> Pengajuan
    </div>
    <div class="nav-item" onclick="alert('Layanan Telepon Rajanyacuan')">
      <span class="nav-icon">📞</span> Telepon
    </div>
    <div class="nav-item" onclick="switchAccount()">
      <span class="nav-icon">👤</span> Profil
    </div>
  </div>

  <script>
    const waInput = document.getElementById('waInput');
    const tableBody = document.getElementById('tableBody');
    const tableHead = document.getElementById('tableHead');
    const tableTitle = document.getElementById('tableTitle');
    const brandDesc = document.getElementById('brandDesc');
    const webTitle = document.getElementById('webTitle');

    function switchAccount() {
      alert("Profil Rajanyacuan Aktif!");
    }

    function openModal() {
      if (waInput.value.trim() === "") return;
      document.getElementById('overlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('overlay').style.display = 'none';
    }

    function showHistoryData() {
      document.getElementById('navData').classList.add('active');
      document.getElementById('navPengajuan').classList.remove('active');
      tableTitle.innerText = "WD RAJANYACUAN HARI INI";
      tableHead.innerHTML = "<tr><th>Provider</th><th>Nama</th><th>WA</th><th>Status</th></tr>";

      const historyData = [
        { provider: "PG SOFT", nama: "DEWI089", wa: "+62838561xxxx", status: "DONE" },
        { provider: "PRAGMATIC", nama: "Febiyanto", wa: "+62822879xxxx", status: "DONE" }
      ];

      tableBody.innerHTML = "";
      historyData.forEach(item => {
        tableBody.innerHTML += `<tr><td>${item.provider}</td><td>${item.nama}</td><td>${item.wa}</td><td><span class="status-done">${item.status}</span></td></tr>`;
      });
    }

    function showPengajuan() {
      document.getElementById('navData').classList.remove('active');
      document.getElementById('navPengajuan').classList.add('active');
      tableTitle.innerText = "Pengajuan Jackpot RAJANYACUAN";
      brandDesc.innerText = "Cari nomor WA (RAJANYACUAN)";
      tableHead.innerHTML = "<tr><th>Tgl</th><th>Nomor WA</th><th>Uid</th><th>Depo</th></tr>";
      tableBody.innerHTML = "";
    }

    function prosesData() {
      const now = new Date().toLocaleDateString('id-ID');
      tableBody.insertAdjacentHTML('afterbegin', `<tr><td>${now}</td><td>${waInput.value}</td><td>${Math.floor(100000+Math.random()*900000)}</td><td>DEP-${Math.floor(1000+Math.random()*9000)}</td></tr>`);
      closeModal();
      waInput.value = "";
    }

    waInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") openModal();
    });
  </script>
</body>
</html>
